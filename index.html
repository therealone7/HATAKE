<!DOCTYPE html>
<html lang="en"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Pro | Cinematic Experience</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="dark-theme">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-compact-disc fa-spin"></i>
                <span>Music Pro</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-link active" id="homeBtn"><i class="fas fa-home"></i> Home</a>
                <a href="#" class="nav-link" id="searchBtn"><i class="fas fa-search"></i> Search</a>
                <a href="#" class="nav-link"><i class="fas fa-heart"></i> Favorites</a>
            </nav>
            <div class="sidebar-divider"></div>
            <div class="user-section">
                <button class="btn-create" id="openAddAlbumBtn"><i class="fas fa-plus-circle"></i> Create Album</button>
                <div class="profile-card" id="loginBtn">
                    <img src="https://ui-avatars.com/api/?name=User&background=1db954&color=fff" alt="Avatar" id="userAvatar">
                    <span id="profileText">Sign In</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <button id="mobileMenuBtn" class="mobile-only"><i class="fas fa-bars"></i></button>
                <div class="welcome-msg">
                    <h1 id="welcomeText">Welcome Back</h1>
                    <p>Experience high-fidelity cinematic sound</p>
                </div>
            </header>

            <section id="searchSection" class="content-section" style="display: none;">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search for tracks, albums, or artists...">
                </div>
                <div class="grid-layout" id="searchResultsGrid"></div>
            </section>

            <section id="homeSection" class="content-section">
                <h2 class="section-title">Recommended Collections</h2>
                <div class="grid-layout" id="albumsGrid">
                    </div>
            </section>
        </main>

        <footer class="player-bar">
            <div class="player-info">
                <img src="https://via.placeholder.com/60" alt="Cover" id="playerCover" class="glow-effect">
                <div class="track-details">
                    <div class="track-name" id="trackTitle">Select a Track</div>
                    <div class="track-artist" id="trackArtist">-</div>
                </div>
            </div>

            <div class="player-controls">
                <div class="buttons">
                    <button class="icon-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
                    <button class="icon-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                    <button class="play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                    <button class="icon-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                    <button class="icon-btn" id="repeatBtn"><i class="fas fa-repeat"></i></button>
                </div>
                <div class="progress-wrapper">
                    <span class="time" id="currentTime">0:00</span>
                    <div class="progress-container" id="progressBar">
                        <div class="progress-fill" id="progress"></div>
                    </div>
                    <span class="time" id="duration">0:00</span>
                </div>
            </div>

            <div class="player-extra desktop-only">
                <i class="fas fa-volume-up" id="muteBtn"></i>
                <input type="range" min="0" max="100" value="70" class="vol-slider" id="volumeSlider">
            </div>
        </footer>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card" id="loginModal">
            <h3>Account Access</h3>
            <form id="loginForm" class="glass-form">
                <input type="text" id="usernameInput" placeholder="Username" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>
    </div>

    <audio id="audioPlayer"></audio>
    <script src="script.js"></script>
</body>
</html>
